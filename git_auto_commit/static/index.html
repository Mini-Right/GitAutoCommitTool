<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Auto Commit - 管理面板</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --green: #3fb950;
  --yellow: #d2991d;
  --red: #f85149;
  --blue: #58a6ff;
  --accent: #238636;
  --accent-hover: #2ea043;
  --danger: #da3633;
  --danger-hover: #f85149;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height:1.5; min-height:100vh; }
.container { max-width:1100px; margin:0 auto; padding:20px; }
h1 { font-size:20px; font-weight:600; }
h2 { font-size:16px; font-weight:600; margin-bottom:12px; }

/* Status Bar */
.status-bar { display:flex; gap:20px; flex-wrap:wrap; padding:16px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px; align-items:center; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.status-dot.on { background:var(--green); }
.status-dot.off { background:var(--red); }
.status-item { font-size:13px; color:var(--text2); }
.status-item span { color:var(--text); font-weight:600; }

/* Panels */
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:20px; }
.panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }

/* Buttons */
.btn { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-green { background:var(--accent); color:#fff; }
.btn-blue { background:var(--blue); color:#fff; }
.btn-red { background:var(--danger); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-sm { padding:3px 10px; font-size:12px; }

/* Table */
table { width:100%; border-collapse:collapse; }
th, td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
th { color:var(--text2); font-weight:500; font-size:12px; }
td { color:var(--text); }
tr:hover td { background:rgba(255,255,255,.02); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-green { background:rgba(63,185,80,.15); color:var(--green); }
.badge-yellow { background:rgba(210,153,29,.15); color:var(--yellow); }
.badge-red { background:rgba(248,81,73,.15); color:var(--red); }
.badge-gray { background:rgba(139,148,158,.15); color:var(--text2); }

/* Forms */
input, select { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 12px; color:var(--text); font-size:13px; width:100%; outline:none; }
input:focus { border-color:var(--blue); }
.form-row { display:flex; gap:8px; align-items:flex-end; }
.form-row > * { flex:1; }
.form-row > .btn { flex:0 0 auto; }
.form-label { font-size:12px; color:var(--text2); display:block; margin-bottom:4px; }

/* Toggle */
.toggle { position:relative; display:inline-block; width:40px; height:22px; cursor:pointer; }
.toggle input { display:none; }
.toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:11px; transition:.2s; }
.toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--accent); }
.toggle input:checked + .toggle-slider::before { transform:translateX(18px); }

/* History */
.history-cycle { margin-bottom:8px; padding:8px 12px; background:var(--bg); border-radius:6px; font-size:12px; cursor:pointer; }
.history-cycle:hover { background:rgba(255,255,255,.03); }
.history-detail { display:none; margin-top:8px; }
.history-detail.open { display:block; }

/* Toast */
.toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:8px; font-size:13px; z-index:999; animation:slideIn .3s; }
.toast-ok { background:var(--accent); color:#fff; }
.toast-err { background:var(--danger); color:#fff; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* Settings grid */
.settings-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; margin-bottom:16px; }

/* Responsive */
@media (max-width:768px) { .form-row { flex-direction:column; } }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1>🔧 Git Auto Commit</h1>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green" onclick="triggerScan()">立即扫描</button>
      <button class="btn btn-outline" onclick="refresh()">刷新</button>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-item">状态 <span class="status-dot on" id="statusDot"></span> <span id="statusLabel">运行中</span></div>
    <div class="status-item">扫描间隔 <span id="statusInterval">-</span></div>
    <div class="status-item">下次扫描 <span id="statusNext">-</span></div>
    <div class="status-item">仓库总数 <span id="statusRepoCount">-</span></div>
    <div class="status-item" id="scanningBadge" style="display:none;color:var(--yellow);">⏳ 正在扫描...</div>
  </div>

  <!-- Repos -->
  <div class="panel">
    <div class="panel-header">
      <h2>仓库列表</h2>
    </div>
    <div class="form-row" style="margin-bottom:16px;">
      <div>
        <label class="form-label">添加仓库</label>
        <input type="text" id="newRepoPath" placeholder="输入仓库本地路径，如 D:/Projects/my-app">
      </div>
      <button class="btn btn-green" onclick="addRepo()" style="align-self:flex-end;">添加</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>仓库</th><th>路径</th><th>状态</th><th>最近提交</th><th>推送</th><th>启用</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="repoTable"></tbody>
    </table>
  </div>

  <!-- Settings -->
  <div class="panel">
    <div class="panel-header">
      <h2>全局设置</h2>
      <button class="btn btn-blue" onclick="saveSettings()">保存设置</button>
    </div>
    <div class="settings-grid">
      <div>
        <label class="form-label">扫描间隔（分钟）</label>
        <input type="number" id="settingInterval" min="1" value="30">
      </div>
      <div>
        <label class="form-label">Push 前先 Pull</label>
        <select id="settingPull">
          <option value="true">是</option>
          <option value="false">否</option>
        </select>
      </div>
      <div>
        <label class="form-label">Push 重试次数</label>
        <input type="number" id="settingRetries" min="0" max="10" value="3">
      </div>
      <div>
        <label class="form-label">重试间隔（秒）</label>
        <input type="number" id="settingRetryDelay" min="1" max="60" value="5">
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="panel">
    <div class="panel-header">
      <h2>扫描历史</h2>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
const API = '';

function toast(msg, ok=true) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function refresh() {
  try {
    const res = await fetch(API + '/api/status');
    const data = await res.json();
    renderStatus(data);
    renderRepos(data.repos);
  } catch(e) {
    toast('获取状态失败: ' + e.message, false);
  }
}

function renderStatus(data) {
  document.getElementById('statusInterval').textContent = data.interval_minutes + ' 分钟';
  document.getElementById('statusNext').textContent = data.next_scan_time || '-';
  document.getElementById('statusRepoCount').textContent = data.repos.length;
  document.getElementById('scanningBadge').style.display = data.scanning ? '' : 'none';
}

function renderRepos(repos) {
  const tbody = document.getElementById('repoTable');
  tbody.innerHTML = repos.map(r => {
    let stateBadge, pushBadge;
    switch(r.state) {
      case 'DIRTY':
        stateBadge = r.commit_hash === 'DRY_RUN'
          ? '<span class="badge badge-yellow">预览</span>'
          : '<span class="badge badge-green">已提交</span>';
        break;
      case 'CLEAN':
        stateBadge = '<span class="badge badge-gray">无变更</span>';
        break;
      case 'ERROR':
        stateBadge = `<span class="badge badge-red" title="${h(r.error_message)}">错误</span>`;
        break;
      case 'SKIPPED':
        stateBadge = '<span class="badge badge-gray">已禁用</span>';
        break;
      default:
        stateBadge = '<span class="badge badge-gray">未知</span>';
    }
    if (r.push_success === true) pushBadge = '<span class="badge badge-green">已推送</span>';
    else if (r.push_success === false) pushBadge = '<span class="badge badge-red">失败</span>';
    else if (r.state === 'DIRTY') pushBadge = '<span class="badge badge-gray">未推送</span>';
    else pushBadge = '<span class="badge badge-gray">-</span>';

    return `<tr>
      <td><strong>${h(r.name)}</strong></td>
      <td style="font-size:12px;color:var(--text2);">${h(r.path)}</td>
      <td>${stateBadge}</td>
      <td style="font-family:monospace;font-size:12px;">${r.commit_hash || '-'}</td>
      <td>${pushBadge}</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${r.enabled ? 'checked' : ''} onchange="toggleRepo('${h(r.path)}', this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td>
        <button class="btn btn-red btn-sm" onclick="deleteRepo('${h(r.path)}')">删除</button>
      </td>
    </tr>`;
  }).join('');
}

function h(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function triggerScan() {
  try {
    const res = await fetch(API + '/api/scan', { method:'POST', headers:{'Content-Type':'application/json'} });
    const data = await res.json();
    toast(data.message, data.ok);
    if (data.ok) setTimeout(refresh, 2000);
  } catch(e) {
    toast('触发失败: ' + e.message, false);
  }
}

async function addRepo() {
  const inp = document.getElementById('newRepoPath');
  const path = inp.value.trim();
  if (!path) { toast('请输入仓库路径', false); return; }
  try {
    const res = await fetch(API + '/api/repos', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    const data = await res.json();
    toast(data.message, data.ok);
    if (data.ok) { inp.value = ''; refresh(); }
  } catch(e) {
    toast('添加失败: ' + e.message, false);
  }
}

async function toggleRepo(path, enabled) {
  try {
    const res = await fetch(API + '/api/repos', {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({path, enabled})
    });
    const data = await res.json();
    if (data.ok) refresh();
    else toast(data.message, false);
  } catch(e) {
    toast('操作失败: ' + e.message, false);
  }
}

async function deleteRepo(path) {
  if (!confirm('确认删除仓库 ' + path + '？')) return;
  try {
    const res = await fetch(API + '/api/repos', {
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    const data = await res.json();
    toast(data.message, data.ok);
    if (data.ok) refresh();
  } catch(e) {
    toast('删除失败: ' + e.message, false);
  }
}

async function saveSettings() {
  const body = {
    interval_minutes: parseInt(document.getElementById('settingInterval').value) || 30,
    pull_before_push: document.getElementById('settingPull').value === 'true',
    max_push_retries: parseInt(document.getElementById('settingRetries').value) || 3,
    push_retry_delay_seconds: parseInt(document.getElementById('settingRetryDelay').value) || 5,
  };
  try {
    const res = await fetch(API + '/api/settings', {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    toast(data.message, data.ok);
    if (data.ok) refresh();
  } catch(e) {
    toast('保存失败: ' + e.message, false);
  }
}

async function loadHistory() {
  try {
    const res = await fetch(API + '/api/history');
    const cycles = await res.json();
    const container = document.getElementById('historyList');
    if (cycles.length === 0) {
      container.innerHTML = '<div style="color:var(--text2);font-size:13px;">暂无扫描记录</div>';
      return;
    }
    container.innerHTML = cycles.slice().reverse().map((cycle, i) => {
      const idx = cycles.length - 1 - i;
      const summary = cycle.map(r => {
        let icon = r.state === 'DIRTY' ? '✅' : r.state === 'CLEAN' ? '➖' : '❌';
        return icon + ' ' + h(r.name) + (r.commit_hash ? ' ' + r.commit_hash : '');
      }).join('  ');
      return `<div class="history-cycle" onclick="toggleHistory(this)">
        <strong>#${idx + 1}</strong> ${h(cycle[0]?.timestamp || '')} — ${summary}
        <div class="history-detail">${cycle.map(r => `<div>${h(r.name)}: ${r.state} commit=${r.commit_hash||'-'} push=${r.push_success}</div>`).join('')}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

function toggleHistory(el) {
  const detail = el.querySelector('.history-detail');
  detail.classList.toggle('open');
}

async function loadSettings() {
  try {
    const res = await fetch(API + '/api/config');
    const data = await res.json();
    document.getElementById('settingInterval').value = data.interval_minutes;
    document.getElementById('settingPull').value = data.pull_before_push ? 'true' : 'false';
    document.getElementById('settingRetries').value = data.max_push_retries;
    document.getElementById('settingRetryDelay').value = data.push_retry_delay_seconds;
  } catch(e) {}
}

refresh();
loadSettings();
loadHistory();
setInterval(refresh, 10000);
</script>
</body>
</html>
